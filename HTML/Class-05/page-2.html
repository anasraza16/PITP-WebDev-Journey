<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class-06</title>

    <!-- Internal CSS -->
    <style>
        h1 {
            color: green;
        }

        /* via ID */
        #heading-2 {
            color: blue;
        }

        #heading-3 {
            color: red;
        }

        #heading-4 {
            color: brown;
        }


        /* via Type Selector */
        span {
            color: red;
        }

        /* via CLASS */
        .paragraph {
            color: aqua;
        }
        
        
    </style>

</head>
<body>
    <h1>Internal CSS</h1>
    <hr>    
    <h1>heading 1</h1>
    <h1 id="heading-2">heading 2</h1>
    <h1 id="heading-3">heading 3</h1>
    <h1 id="heading-4">heading 4</h1>

    <p class="paragraph">Lorem ipsum dolor sit amet consectetur adipisicing elit. Neque, hic!</p>
    <p >Lorem ipsum <span>dolor</span> sit amet consectetur adipisicing elit. Neque, hic!</p>
    <p class="paragraph">Lorem ipsum dolor sit amet consectetur adipisicing elit. Neque, hic!</p>
