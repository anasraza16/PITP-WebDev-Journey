<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class-05</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div>

        <form>
            <h3>APPLICATION FORM</h3>

            <!-- Input Feilds -->
            <!-- <label for="name">Name:</label>
        <br> -->
            <input type="text" id="name" placeholder="Name" required>
            <br><br>

            <!-- <label for="email" required>Email:</label>
        <br> -->
            <input type="email" id="email" placeholder="Email" required>
            <br><br>

            <!-- <label for="password">Password:</label>
        <br> -->
            <input type="password" id="password" placeholder="Password" required>
            <hr>

            <!-- Input Radio Buttons -->
            <h5>SELECT YOUR GENDER</h5>

            <input type="radio" name="gender" id="male" required>
            <label for="male">Male</label>

            <input type="radio" name="gender" id="female" required>
            <label for="female">Female</label>

            <input type="radio" name="gender" id="other" required>
            <label for="other">Other</label>
            <hr>
            <br>

            <!-- Dropdown Menu -->
            <label for="dropdown">City:</label>

            <select name="" id="dropdown" required>
                <option selected disabled>select</option>
                <option value="khi">Karachi</option>
                <option value="isl">Islamabad</option>
                <option value="que">Quetta</option>
                <option value="pesh">Peshawar</option>
            </select>
            <br>
            <br>
            <hr>

            <!-- Button -->
            <button type="submit" id="submit" class="button">Submit</button>
            <button type="reset" id="reset" class="button">Reset</button>
            <br>
        </form>
    </div>

    <br>
    <a href="table.html"><button id="pages" class="button">Next</button></a>


</body>

</html>
