<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class-04</title>
</head>

<body>
    <h1>Forms</h1>

    <form action="Post">

        <!-- Forms -->
        <label for="email">Email:</label>
        <input type="email" id="email" required placeholder="Email">
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" required placeholder="Password">
        <br><br>

        <!-- Radio Buttons -->
        <label>Gender:</label>

        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>

        <input type="radio" name="gender" id="female">
        <label for="female">Female</label>

        <input type="radio" name="gender" id="other">
        <label for="other">Other</label>
        <br><br>

        <!-- Qualification -->
        <label>Qualification:</label>

        <input type="radio" name="qualification" id="post-graduate">
        <label for="post-graduate">Post-Graduate</label>

        <input type="radio" name="qualification" id="under-graduate">
        <label for="under-graduate">Under-Graduate</label>
        <br><br>

        <!-- Dropdown -->
        <label>City:</label>

        <select name="" id="">
            <option disabled selected>Select</option>
            <option value="karachi">Karachi</option>
            <option value="lahore">Lahore</option>
            <option value="peshawar">Peshawar</option>
            <option value="quetta">Quetta</option>
        </select>
        <br><br>

        <!-- Checkbox -->
        <input type="checkbox" name="" id="reading">
        <label for="reading">Reading</label>

        <input type="checkbox" name="" id="martial-arts">
        <label for="martial-arts">Martial Arts</label>

        <input type="checkbox" name="" id="gaming">
        <label for="gaming">Gaming</label>

        <!-- Button -->
        <br><br>
        <button type="">Submit</button>

    </form>

</body>

</html>
